    RevenueAnalytics:
      type: object
      required: [period, data, totalRevenue, growth]
      properties:
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        totalRevenue:
          type: number
        growth:
          type: number

    CustomerRetention:
      type: object
      required: [activeCustomers, lostCustomers, newCustomers, retentionRate]
      properties:
        activeCustomers:
          type: integer
        lostCustomers:
          type: integer
        newCustomers:
          type: integer
        retentionRate:
          type: number
        averageTenureMonths:
          type: number

    ChurnRisk:
      type: object
      required: [customerId, customerName, riskScore, riskLevel, reasons]
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        riskScore:
          type: number
        riskLevel:
          type: string
          enum: [low, medium, high]
        reasons:
          type: array
          items:
            type: string
        lastAttendanceDate:
          type: ["string", "null"]

    OwnerAnalyticsOverview:
      type: object
      required: [revenueGrowth, retentionRate, churnRisk, collectionEfficiency, avgAttendanceRate]
      properties:
        revenueGrowth:
          type: number
        retentionRate:
          type: number
        churnRisk:
          type: number
        collectionEfficiency:
          type: number
        avgAttendanceRate:
          type: number

    # ── NOTIFICATION SCHEMAS ──────────────────────────────────────────────
    Notification:
      type: object
      required: [id, userId, type, title, message, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [budget_alert, payment_overdue, churn_risk, attendance_anomaly, unusual_spending, meal_reminder, system]
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ── CONNECTION SCHEMAS ────────────────────────────────────────────────
    JoinServiceInput:
      type: object
      required: [serviceCode]
      properties:
        serviceCode:
          type: string

    ServiceConnection:
      type: object
      required: [id, studentId, ownerId, businessName, status, joinedAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        ownerId:
          type: integer
        businessName:
          type: string
        status:
          type: string
          enum: [active, inactive]
        joinedAt:
          type: string
          format: date-time

    ConnectedStudent:
      type: object
      required: [connectionId, studentId, studentName, email, joinedAt, status]
      properties:
        connectionId:
          type: integer
        studentId:
          type: integer
        studentName:
          type: string
        email:
          type: string
        joinedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive]
        customerId:
          type: ["integer", "null"]
