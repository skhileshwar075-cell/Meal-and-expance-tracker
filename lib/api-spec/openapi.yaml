          type: integer
        month:
          type: integer
        year:
          type: integer
        discount:
          type: number
        extraCharges:
          type: number
        notes:
          type: string
        dueDate:
          type: string
          format: date

    BillUpdateInput:
      type: object
      properties:
        discount:
          type: number
        extraCharges:
          type: number
        notes:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [paid, unpaid, partial]

    # ── PAYMENT SCHEMAS ───────────────────────────────────────────────────
    Payment:
      type: object
      required: [id, customerId, customerName, billId, amount, status, createdAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        billId:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [paid, unpaid, partial]
        paymentDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
