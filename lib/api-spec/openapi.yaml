        paidAmount:
          type: number
        dueDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    BillGenerateInput:
      type: object
      required: [customerId, month, year]
      properties:
