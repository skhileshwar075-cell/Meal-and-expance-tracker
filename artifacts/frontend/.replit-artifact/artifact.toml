kind = "web"
previewPath = "/"
title = "Smart Tiffin & Student Analytics Platform"
version = "1.0.0"
id = "artifacts/smart-tiffin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frontend", "run", "build" ]
publicDir = "artifacts/frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8081"
BASE_PATH = "/"
